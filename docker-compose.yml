version: "3.8"

services:
  # Oracle Database
  oracle:
    image: gvenzl/oracle-xe:latest
    container_name: userlogin-oracle
    environment:
      ORACLE_PASSWORD: userlogin
      ORACLE_ALLOW_REMOTE: "true"
    ports:
      - "1522:1521" # Changed host port to 1522 to avoid conflict
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - userlogin-network

  # Spring Boot Backend
  backend:
    build:
      context: ./userloginservice
      dockerfile: Dockerfile
    container_name: userlogin-backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_URL: jdbc:oracle:thin:@oracle:1521/XEPDB1 # Container port remains 1521
      DB_USERNAME: userlogin
      DB_PASSWORD: userlogin
      JWT_SECRET: 5367566859703373367639792F423F452848284D6251655468576D5A71347437
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - oracle
    networks:
      - userlogin-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/actuator/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: userlogin-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_BASE: http://localhost:8080
      REACT_APP_API_PREFIX: /auth/api/v1
    depends_on:
      - backend
    networks:
      - userlogin-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  oracle-data:
    driver: local

networks:
  userlogin-network:
    driver: bridge

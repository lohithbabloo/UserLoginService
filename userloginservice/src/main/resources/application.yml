server:
  port: ${PORT:8080}

spring:
  application:
    name: userloginservice
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/userloginservice}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:db1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  jwt:
    secret: ${JWT_SECRET:5367566859703373367639792F423F452848284D6251655468576D5A71347437}
    expiration-minutes: 15
